{% extends 'base.html' %}

{% block title %}Editar Pedido{% endblock %}

{% block content %}
<div class="full-width">
    <div class="pedido-container">
        <h2>Editar Datos del Pedido</h2>
        <form action="{{ url_for('editar_pedido', id=pedido.id) }}" method="POST" class="pedido-form">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" value="{{ pedido.nombre }}" required>

            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" value="{{ pedido.apellido }}" required>

            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" value="{{ pedido.email }}" required>

            <label for="opciones">Elige un Plato:</label>
            <select id="opciones" name="opciones">
                <option value="Espagueti" {% if pedido.opcion == 'Espagueti' %}selected{% endif %}>Espagueti</option>
                <option value="Pollo al ajillo" {% if pedido.opcion == 'Pollo al ajillo' %}selected{% endif %}>Pollo al ajillo</option>
                <option value="Salmon a la parilla" {% if pedido.opcion == 'Salmon a la parilla' %}selected{% endif %}>Salmón a la parilla</option>
                <option value="Pescado del dia" {% if pedido.opcion == 'Pescado del dia' %}selected{% endif %}>Pescado del día</option>
                <option value="Postre artesanal" {% if pedido.opcion == 'Postre artesanal' %}selected{% endif %}>Postre artesanal</option>
                <option value="Tabla de quso de autor" {% if pedido.opcion == 'Tabla de quso de autor' %}selected{% endif %}>Tabla de queso de autor</option>
            </select>
            
            <button type="submit" style="background: #4a90e2;">Guardar Cambios</button>
            <a href="{{ url_for('index') }}" style="margin-left: 10px; color: #555; text-decoration: none;">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
