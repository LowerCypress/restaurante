{% extends 'base.html' %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<main class="container" style = content:justify-content; margin-top: 50px;">
    <section class="row justify-content-center">
        <style>
            .container {
                background-color: #e0e0d1;
                padding: 20px;
                border-radius: 8px;
            }   
            .card-body {
                background-color: #e0e0d1;
                padding: 20px;
                border-radius: 8px;
                margin-bottom: 20px;
            }
            h2 {
                color: #333333;
                margin-bottom: 20px;
            }
            label {
                display: block;
                margin-bottom: 10px;
                color: #333333;
                font-weight: 700;
            }
            input[type="text"],
            input[type="password"] {   
                width: 100%;
                padding: 10px;
                margin-bottom: 20px;
                border: 1px solid #cccccc;
                border-radius: 4px;
                font-size: 1rem;
            }
            button {
                width: 100%;
                padding: 12px;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 4px;
                font-size: 1rem;
                cursor: pointer;  
            }
            button:hover {
                background-color: #0056b3;
            }
            a {
                color: #007bff;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline; 
            }
        </style>

        
            <h2>🔐 Iniciar sesión</h2>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}

        <form method="POST" class="col-md-4">
                <label>Usuario</label>
                <input type="text" name="username" class="form-control" required>

                <label>Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            
            <button class="btn btn-primary w-100">Iniciar sesión</button>

            <p style="margin: auto;">
                ¿No tienes cuenta? <a href="{{ url_for('register') }}">Regístrate aquí</a>
            </p>
            </form>
    </section>
</main>

{% endblock %}
